<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộ trình phát triển - Kareer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-shadow: none !important;
            font-family: inherit;
        }
        :root {
            --primary: #000000;
            --accent: #ffde59;
            --bg: #ffffff;
            --text: #1a1a1a;
            --gray: #ffffff;
        }

        html, body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            background: #ffffff;
            height: auto !important;
            -ms-overflow-style: none;
            scrollbar-width: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10rem 2rem 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        /* ─── TAB NAVIGATION (STANDARDIZED) ─── */
        .tab-container {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #fff;
            border: 2px solid #000;
            border-radius: 100px;
            width: fit-content;
            z-index: 2000;
            box-shadow: 8px 8px 0px #000;
        }

        .tab-item {
            padding: 0.7rem 1.8rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            color: #000;
            background: transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-item:hover {
            background: #f0f0f0;
        }

        .tab-item.active {
            background: #000;
            color: #fff;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .timeline-content { padding: 1.5rem; }
        }

        .main-logo {
            height: 55px;
            width: auto;
            display: block;
        }

        @media (max-width: 768px) {
            .main-header {
                left: 50%;
                transform: translateX(-50%);
                top: 0.5rem;
            }
            .main-logo {
                height: 35px;
            }
        }

        /* Loading Animation */
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #000;
            border-bottom-color: #ffde59;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Roadmap Timeline */
        .roadmap-timeline {
            position: relative;
            margin: 40px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .roadmap-timeline.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-item {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 17px;
            top: 40px;
            bottom: -40px;
            width: 4px;
            background: #000;
            z-index: 0;
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .phase-number {
            width: 40px;
            height: 40px;
            background: #ffde59;
            border: 3px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .phase-content {
            background: #fff;
            border: 3px solid #000;
            padding: 2rem;
            border-radius: 20px;
            flex-grow: 1;
            box-shadow: 8px 8px 0px #000;
        }

        .phase-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .duration-badge {
            font-size: 0.8rem;
            background: #000;
            color: #fff;
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 600;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item::before {
            content: '→';
            font-weight: 800;
        }

        .cta-box {
            text-align: center;
            margin-top: 5rem;
            padding: 4rem;
            background: #f8f9fa;
            border: 3px solid #000;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* Edit Prompt System */
        .edit-prompt-container {
            display: none;
            width: 100%;
            max-width: 600px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .edit-input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .edit-input {
            flex-grow: 1;
            padding: 1.2rem;
            border: 3px solid #000;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }

        .btn-generate {
            background: #000;
            color: #fff;
            border: none;
            padding: 0 2rem;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-generate:hover {
            transform: scale(1.02);
            background: #222;
        }

        .btn-generate:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>
    <header class="main-header" style="position: fixed; top: 1.5rem; left: 2rem; z-index: 9999;">
        <div class="logo-area">
            <a href="index.html">
                <img src="KAREER.png" alt="Kareer Logo" class="main-logo">
            </a>
        </div>
    </header>

    <div class="tab-container">
        <a href="step2.html" class="tab-item">Kết quả phân tích</a>
        <a href="step3.html" class="tab-item">Định hướng</a>
        <a href="timeline.html" class="tab-item">Chi tiết nghề nghiệp</a>
        <a href="#" class="tab-item active">Lộ trình phát triển</a>
    </div>

    <div class="container">
        <header>
            <h1 style="font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 1rem;">Lộ trình <span>Cá nhân hóa</span></h1>
            <p id="roadmap-subtitle" style="font-size: 1.1rem; color: #666; max-width: 600px; margin: 0 auto; font-weight: 500;">
                Đang khởi tạo lộ trình tối ưu dựa trên hồ sơ năng lực của bạn...
            </p>
        </header>

        <div id="loading" class="loading-container" style="display: flex;">
            <span class="loader"></span>
            <p style="margin-top: 1.5rem; font-weight: 700; letter-spacing: 1px;">AI ĐANG TƯ DUY...</p>
        </div>

        <div id="roadmap-container" class="roadmap-timeline">
            <!-- Roadmap content will be injected here -->
        </div>

        <div class="cta-box">
            <button class="btn-primary" onclick="showEditPrompt()" style="border: 2px solid #000; cursor: pointer; background: #fff; color: #000; padding: 1.2rem 3rem; font-weight: 800; border-radius: 100px; text-transform: uppercase; letter-spacing: 1px;">TẠO LẠI LỘ TRÌNH</button>
            
            <div id="edit-prompt-area" class="edit-prompt-container">
                <div class="edit-input-group">
                    <input type="text" id="edit-prompt" class="edit-input" placeholder="Ví dụ: 'Tôi muốn lộ trình tập trung vào mảng Marketing hơn'...">
                    <button id="btn-re-generate" onclick="regenerateRoadmap()" class="btn-generate">GỬI</button>
                </div>
            </div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script>
        let currentRoadmap = null;
        let selectedCareer = localStorage.getItem('selectedCareer') || "Quản trị viên Dự án";

        async function initRoadmap() {
            const quizResult = JSON.parse(localStorage.getItem('kareer_result') || '{}');
            const scores = quizResult.scores || {};
            
            try {
                const response = await fetchRoadmap(selectedCareer, scores);
                currentRoadmap = response;
                renderRoadmap(response);
            } catch (error) {
                console.error("Roadmap generation failed:", error);
                renderFallbackRoadmap();
            }
        }

        function renderRoadmap(data) {
            const container = document.getElementById('roadmap-container');
            const loading = document.getElementById('loading');
            const subtitle = document.getElementById('roadmap-subtitle');

            subtitle.innerText = `Lộ trình chinh phục vị trí ${selectedCareer} dành riêng cho bạn.`;
            loading.style.display = 'none';
            container.classList.add('visible');

            container.innerHTML = data.phases.map((phase, index) => `
                <div class="timeline-item">
                    <div class="phase-number">${index + 1}</div>
                    <div class="phase-content">
                        <div class="phase-title">
                            ${phase.name}
                            <span class="duration-badge">${phase.duration}</span>
                        </div>
                        <ul class="task-list">
                            ${phase.tasks.map(task => `<li class="task-item">${task}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        }

        function renderFallbackRoadmap() {
            const fallback = {
                phases: [
                    { name: "Nền tảng & Tư duy", duration: "Tháng 1-2", tasks: ["Nghiên cứu kiến thức cơ sở", "Tham gia cộng đồng chuyên môn"] },
                    { name: "Kỹ năng thực thi", duration: "Tháng 3-6", tasks: ["Thực hành dự án thực tế", "Học các công cụ chuyên dụng"] },
                    { name: "Bứt phá & Kết nối", duration: "Tháng 7-12", tasks: ["Xây dựng Portfolio", "Tìm kiếm mentor và cơ hội việc làm"] }
                ]
            };
            renderRoadmap(fallback);
        }

        function showEditPrompt() {
            document.getElementById('edit-prompt-area').style.display = 'block';
            document.querySelector('.btn-primary').style.display = 'none';
        }

        async function regenerateRoadmap() {
            const prompt = document.getElementById('edit-prompt').value;
            const btn = document.getElementById('btn-re-generate');
            if (!prompt) return;

            btn.disabled = true;
            btn.innerText = "...";
            
            document.getElementById('roadmap-container').classList.remove('visible');
            document.getElementById('loading').style.display = 'flex';

            try {
                const quizResult = JSON.parse(localStorage.getItem('kareer_result') || '{}');
                const scores = quizResult.scores || {};
                const response = await fetchRoadmap(selectedCareer, scores, prompt);
                currentRoadmap = response;
                renderRoadmap(response);
            } catch (error) {
                console.error("Regeneration failed:", error);
                renderFallbackRoadmap();
            } finally {
                btn.disabled = false;
                btn.innerText = "GỬI";
                document.getElementById('edit-prompt-area').style.display = 'none';
                document.querySelector('.btn-primary').style.display = 'inline-block';
            }
        }

        window.onload = initRoadmap;
    </script>
</body>
</html>
