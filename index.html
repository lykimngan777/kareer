<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành Trình Tìm Kiếm Career Path | Mark Twain Quote</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay-grain"></div>
    <header class="main-header">
        <div class="logo-area">
            <img src="logo.png" alt="Keyreer Logo" class="main-logo" style="mix-blend-mode: multiply;">
        </div>
    </header>
    <main>
        <section class="quote-section">
            <div class="quote-wrapper">
                <span class="quote-icon-top">“</span>
                <h1 class="quote-text" id="typewriter-quote" data-text="Hai ngày quan trọng nhất đời người là ngày bạn sinh ra và ngày bạn tìm ra lý do tại sao mình tồn tại."></h1>
                <span class="quote-icon-bottom">”</span>
                <p class="author">_Mark Twain_</p>
                <div class="button-wrapper">
                    <button id="cta-button" class="btn-premium">
                        <span class="btn-text">Khám phá sứ mệnh của bạn</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>
            </div>
        </section>
        <!-- Features, Steps... -->
    </main>
    <script src="config.js"></script>
    <script src="api-client.js"></script>
    <script src="script.js"></script>
