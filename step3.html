<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix | Định Hướng Nghề Nghiệp Gen Z</title>
    <meta name="description"
        content="Website định hướng nghề nghiệp phong cách tối giản dành cho thế hệ Gen Z. Khám phá bản thân và tìm kiếm lộ trình sự nghiệp phù hợp.">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Updated: step3.css (was /Step_3_Matrix/style.css) -->
    <link rel="stylesheet" href="step3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="main-header">
        <div class="logo-area">
            <a href="index.html">
                <img src="KAREER.png" alt="Kareer Logo" class="main-logo">
            </a>
        </div>
    </header>

    <div class="tab-container">
        <a href="step2.html" class="tab-item">Kết quả phân tích</a>
        <a href="step3.html" class="tab-item active">Định hướng</a>
        <a href="timeline.html" id="tab-detail" class="tab-item">Chi tiết nghề nghiệp</a>
        <a href="roadmap.html" id="tab-roadmap" class="tab-item">Lộ trình phát triển</a>
    </div>

    <main>
        <section id="explorer" class="explorer-view">

            <div class="matrix-canvas" id="matrix-canvas">
                <div class="matrix-grid"></div>

                <!-- Satellite Orbits -->
                <div class="orbits-container">
                    <div class="orbit-ring tier-1"></div>
                    <div class="orbit-ring tier-2"></div>
                    <div class="orbit-ring tier-3"></div>
                    <div class="orbit-ring tier-4"></div>
                    <div class="orbit-ring tier-5"></div>
                </div>

                <!-- Central Hub -->
                <div class="central-hub">
                    <div class="hub-content">
                        <p>Tôi nên chọn <br> công việc nào?</p>
                        <div class="hub-arrow">↓</div>
                    </div>
                    <div class="hub-glow"></div>
                </div>

                <!-- Career Nodes (Generated by JS) -->
                <div id="career-nodes"></div>

                <!-- Color Legend -->
                <div class="matrix-legend">
                    <div class="legend-items">
                        <div class="legend-item"><span class="legend-dot vh"></span> Rất cao</div>
                        <div class="legend-item"><span class="legend-dot h"></span> Cao</div>
                        <div class="legend-item"><span class="legend-dot m"></span> Trung bình</div>
                        <div class="legend-item"><span class="legend-dot l"></span> Thấp</div>
                        <div class="legend-item"><span class="legend-dot vl"></span> Rất thấp</div>
                    </div>
                </div>

                <!-- Analysis Modal (Full-Screen) -->
                <div id="strengths-modal" class="modal">
                    <div class="modal-content-fullscreen">
                        <button class="close-modal-btn">&times;</button>
                        <div class="analysis-text-wrapper">
                            <div id="analysis-paragraph" class="analysis-paragraph"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="config.js"></script>
    <script src="api-client.js"></script>
    <script src="database.js"></script>
    <script src="step3_v2.js"></script>
</body>

</html>
