<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma trận định hướng nghề nghiệp | Kareer AI</title>
    <link rel="stylesheet" href="step3.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header" style="position:fixed; top:1.5rem; left:2rem; z-index:2000;">
        <a href="index.html">
            <img src="KAREER.png" alt="Kareer Logo" class="main-logo" style="height: 45px;">
        </a>
    </header>

    <div class="tab-container">
        <a href="step2.html" class="tab-item">Kết quả phân tích</a>
        <a href="step3.html" class="tab-item active">Định hướng</a>
        <a href="timeline.html" class="tab-item">Chi tiết nghề nghiệp</a>
        <a href="roadmap.html" class="tab-item">Lộ trình phát triển</a>
    </div>

    <div class="explorer-view">
        <div class="matrix-grid"></div>
        
        <div class="matrix-canvas" id="canvas">
            <div class="central-hub" id="central-hub">
                <div class="hub-glow"></div>
                <div class="hub-content">
                    <p id="hub-name">Bản sắc</p>
                    <div class="hub-icons">✨</div>
                    <span class="hub-arrow">Phân tích ma trận</span>
                </div>
            </div>
            <!-- Career nodes will be injected here -->
        </div>

        <div class="matrix-legend">
            <div class="legend-items">
                <div class="legend-item"><span class="legend-dot vh"></span> Rất cao</div>
                <div class="legend-item"><span class="legend-dot h"></span> Cao</div>
                <div class="legend-item"><span class="legend-dot m"></span> Trung bình</div>
            </div>
        </div>
    </div>

    <!-- WHY AM I SUITABLE? MODAL -->
    <div id="analysis-modal" class="modal">
        <div class="close-analysis" id="close-modal">×</div>
        <div class="analysis-split-view" id="analysis-split-root">
            <!-- Dynamic content from step3_v2.js -->
        </div>
    </div>

    <script src="database.js"></script>
    <script src="step3_v2.js"></script>
</body>
</html>
