<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết nghề nghiệp | Kareer AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --card: #ffffff;
            --accent: #000000;
            --text-main: #111111;
            --text-sub: #666666;
            --border: #eeeeee;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .main-header {
            position: fixed;
            top: 1.5rem;
            left: 2rem;
            z-index: 1000;
        }

        .main-logo {
            height: 45px;
            width: auto;
        }

        /* Standardized Tab Navigation */
        .tab-container {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #fff;
            border: 2px solid #000;
            border-radius: 100px;
            width: fit-content;
            z-index: 2000;
            box-shadow: 8px 8px 0px #000;
        }

        .tab-item {
            padding: 0.7rem 1.8rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            color: #000;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-item:hover { background: #f0f0f0; }
        .tab-item.active { background: #000; color: #fff; }

        .timeline-container {
            max-width: 1100px;
            margin: 120px auto 100px;
            padding: 0 2rem;
        }

        /* Career Hero Section */
        .career-hero {
            background: #000;
            color: #fff;
            padding: 4rem;
            border-radius: 30px;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .career-hero::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .hero-info h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0 0 1rem 0;
            line-height: 1.1;
        }

        .hero-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .hero-meta span { display: flex; align-items: center; gap: 8px; }

        /* Main Content Layout */
        .content-grid {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 2.5rem;
        }

        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i { font-style: normal; font-size: 1.6rem; }

        .job-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #444;
        }

        .list-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            padding: 1.2rem;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            border-color: #000;
            transform: translateX(5px);
        }

        .item-number {
            width: 28px;
            height: 28px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* Sidebar Widgets */
        .widget-salary {
            background: #e7f5ff;
            border-color: #a5d8ff;
            text-align: center;
        }

        .salary-val {
            font-size: 2.2rem;
            font-weight: 900;
            color: #1971c2;
            margin: 0.5rem 0;
        }

        .ai-coaching {
            background: #fff0f6;
            border-color: #ffdeeb;
            position: relative;
        }

        .ai-badge {
            background: #d6336c;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            position: absolute;
            top: -12px;
            right: 20px;
        }

        .ai-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #a61e4d;
            font-style: italic;
        }

        .fit-score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 2rem;
            background: #f8f9fa;
            border-radius: 20px;
        }

        .fit-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(#000 var(--score), #eee 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .fit-ring::after {
            content: attr(data-score-text);
            position: absolute;
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .cta-roadmap {
            display: block;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
            border-radius: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 2rem;
            text-decoration: none;
        }

        .cta-roadmap:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .hero-info h1 { font-size: 2.2rem; }
            .career-hero { padding: 2rem; }
            .tab-container { width: 90%; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="index.html">
            <img src="KAREER.png" alt="Kareer Logo" class="main-logo">
        </a>
    </header>

    <div class="tab-container">
        <a href="step2.html" class="tab-item">Kết quả phân tích</a>
        <a href="step3.html" class="tab-item">Định hướng</a>
        <a href="timeline.html" class="tab-item active">Chi tiết nghề nghiệp</a>
        <a href="roadmap.html" class="tab-item">Lộ trình phát triển</a>
    </div>

    <div class="timeline-container">
        <div id="career-detail-root">
            <!-- Dynamic Content Loaded Here -->
            <div style="text-align: center; padding: 100px;">
                <h2>Đang tải dữ liệu nghề nghiệp...</h2>
                <p>Vui lòng đợi trong giây lát.</p>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selectedCareer = localStorage.getItem('selectedCareer');
            const root = document.getElementById('career-detail-root');
            
            if (!selectedCareer) {
                root.innerHTML = `
                    <div class="card" style="text-align:center; padding: 100px;">
                        <h2>Chưa có nghề nghiệp nào được chọn</h2>
                        <p>Vui lòng quay lại Ma trận định hướng để chọn một nghề nghiệp phù hợp.</p>
                        <a href="step3.html" class="cta-roadmap" style="display:inline-block; padding: 1rem 2rem; width: auto;">Đến Ma trận định hướng</a>
                    </div>
                `;
                return;
            }

            // Find data in database.js (Global specializedData)
            const data = specializedData[selectedCareer] || {
                description: "Thông tin chi tiết cho vị trí này đang được cập nhật. Vui lòng quay lại sau.",
                responsibilities: ["Đang cập nhật..."],
                advantages: ["Đang cập nhật..."],
                salary: "Thỏa thuận",
                aiCoach: "Hãy tập trung phát triển các kỹ năng chuyên môn cốt lõi và xây dựng mạng lưới quan hệ trong ngành này."
            };

            // Calculate Fit (Dummy for UI demonstration, in reality would use scores)
            const resultData = JSON.parse(localStorage.getItem('kareer_result') || '{}');
            const topGroup = resultData.topGroup || "N/A";
            
            root.innerHTML = `
                <div class="career-hero">
                    <div class="hero-info">
                        <div class="hero-meta">
                            <span>📍 Thị trường Việt Nam</span>
                            <span>🔥 Xu hướng: Tăng trưởng</span>
                        </div>
                        <h1>${selectedCareer}</h1>
                        <div class="hero-meta">
                            <span>Nhóm phù hợp nhất: ${topGroup}</span>
                        </div>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="main-col">
                        <div class="card">
                            <h2 class="section-title"><i>📝</i> Mô tả công việc</h2>
                            <div class="job-desc">${data.description}</div>
                        </div>

                        <div class="card">
                            <h2 class="section-title"><i>🎯</i> Nhiệm vụ chính</h2>
                            <div class="list-items">
                                ${data.responsibilities.map((task, i) => `
                                    <div class="list-item">
                                        <div class="item-number">${i+1}</div>
                                        <div>${task}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="card">
                            <h2 class="section-title"><i>🚀</i> Lợi thế cạnh tranh của bạn</h2>
                            <div class="job-desc">
                                Dựa trên bản sắc cá nhân của bạn, đây là những điểm giúp bạn nổi bật:
                                <ul style="margin-top: 1rem;">
                                    ${data.advantages.map(adv => `<li>${adv}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="side-col">
                        <div class="card widget-salary">
                            <div class="section-title" style="justify-content:center; margin-bottom: 0.5rem;">Mức lương kỳ vọng</div>
                            <div class="salary-val">${data.salary}</div>
                            <div style="font-size: 0.8rem; opacity: 0.6;">Dựa trên dữ liệu thị trường 2024</div>
                        </div>

                        <div class="card ai-coaching">
                            <div class="ai-badge">AI Coaching</div>
                            <h2 class="section-title" style="font-size: 1.1rem;">Lời khuyên từ chuyên gia AI</h2>
                            <p class="ai-text">"${data.aiCoach}"</p>
                        </div>

                        <a href="roadmap.html" class="cta-roadmap">Xây dựng lộ trình phát triển →</a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
