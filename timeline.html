<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộ trình thăng tiến | Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="step3.css">
    <style>
        body { overflow-y: auto !important; overflow-x: hidden !important; }
        .timeline-view {
            min-height: 100vh; background: #f8f9fa;
            padding: 8rem 2rem 4rem;
            display: flex; flex-direction: column; align-items: center;
        }
        .timeline-header { text-align: center; margin-bottom: 2rem; animation: fadeIn 1s ease; }
        .timeline-header h1 { font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 0.5rem; color: #111; }
        .timeline-header p { font-family: var(--font-main); color: #666; font-size: 1.1rem; max-width: 600px; }
        .progress-timeline {
            display: flex; justify-content: space-between; align-items: flex-start;
            width: 100%; max-width: 1100px;
            margin: 2rem 0 4rem; position: relative;
        }
        .progress-line { position: absolute; top: 12px; left: 12.5%; right: 12.5%; height: 4px; background: #e5e7eb; z-index: 1; }
        .progress-line-fill { position: absolute; top: 12px; left: 12.5%; height: 4px; background: #000; z-index: 1; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        .timeline-step {
            display: flex; flex-direction: column; align-items: center;
            flex: 1; position: relative; z-index: 2; cursor: pointer;
        }
        .step-marker {
            width: 28px; height: 28px; background: #fff;
            border: 4px solid #e5e7eb; border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 1.5rem;
        }
        .timeline-step.active .step-marker { border-color: #000; background: #000; transform: scale(1.2); box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .step-label {
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase;
            color: #999; transition: color 0.4s ease;
            text-align: center; max-width: 140px; line-height: 1.4; letter-spacing: 0.05em;
        }
        .timeline-step.active .step-label { color: #111; }
        .detail-card {
            width: 100%; max-width: 800px; background: #fff;
            border-radius: 24px; padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s ease; position: relative;
        }
        .detail-card.show { opacity: 1; transform: translateY(0); }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f5f5f5; }
        .detail-title h2 { font-size: 1.8rem; font-weight: 800; color: #111; }
        .detail-time { font-size: 0.9rem; font-weight: 700; color: #666; background: #f8f9fa; padding: 0.5rem 1rem; border-radius: 50px; }
        .detail-body h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; text-transform: uppercase; color: #333; }
        .detail-body p { color: #555; line-height: 1.8; margin-bottom: 2rem; }
        .task-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.2rem; }
        .task-item { display: flex; align-items: center; gap: 0.8rem; font-size: 0.95rem; color: #444; padding: 1rem; background: #fafafa; border-radius: 12px; border: 1px solid #f0f0f0; }
        .task-icon { color: #000; font-weight: 900; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) {
            .timeline-view { padding: 6rem 1rem 4rem; }
            .progress-timeline { flex-direction: column; align-items: flex-start; gap: 2rem; padding-left: 2rem; }
            .progress-line, .progress-line-fill { left: 32px; width: 4px !important; top: 0; bottom: 0; height: auto; }
            .timeline-step { flex-direction: row; gap: 1.5rem; align-items: center; }
            .step-marker { margin-bottom: 0; }
            .step-label { text-align: left; max-width: none; }
            .detail-card { padding: 2rem 1.5rem; }
        }
        .filter-box {
            background: #fff; padding: 1.5rem 2rem; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex; align-items: flex-end; gap: 1.5rem;
            margin-bottom: 3rem; flex-wrap: wrap; justify-content: center;
            width: 100%; max-width: 600px; border: 1px solid #f0f0f0;
            animation: fadeIn 1s ease;
        }
        .select-group { display: flex; flex-direction: column; gap: 0.5rem; min-width: 300px; }
        .select-group label { font-size: 0.8rem; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .select-group select {
            padding: 0.8rem 1.2rem; border-radius: 12px;
            border: 2px solid #eee; font-size: 1rem; color: #111;
            font-weight: 700; outline: none; transition: all 0.3s ease;
            appearance: none; background: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") no-repeat right 1rem center;
            background-size: 1em;
        }
        .select-group select:focus { border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <header class="main-header" style="position: absolute; top: 1.5rem; left: 2rem; z-index: 100;">
        <a href="index.html">
            <img src="Kareer (2).png" alt="Kareer Logo" style="height: 60px; mix-blend-mode: multiply;">
        </a>
    </header>

    <div class="timeline-view">
        <div class="explorer-nav">
            <div class="nav-tab" onclick="location.href='step3.html'">Mở lối sự nghiệp</div>
            <div class="nav-tab active" id="tab-detail" onclick="handleNav('timeline.html')">Chi tiết nghề nghiệp</div>
            <div class="nav-tab" id="tab-roadmap" onclick="handleNav('roadmap.html')">Lộ trình phát triển</div>
        </div>

        <div class="timeline-header">
            <h1>Lộ trình thăng tiến sự nghiệp</h1>
            <p id="career-subtitle">Khám phá các cột mốc quan trọng và những kỹ năng cần thiết để đạt được đỉnh cao trong nghề nghiệp.</p>
        </div>

        <div class="filter-box">
            <div class="select-group">
                <label>Chọn vị trí nghề nghiệp</label>
                <select id="career-select">
                    <option value="UI Designer">UI Designer</option>
                    <option value="UX Researcher">UX Researcher</option>
                    <option value="Frontend Dev">Frontend Developer</option>
                    <option value="Product Manager">Product Manager</option>
                    <option value="Graphic Designer">Graphic Designer</option>
                    <option value="Data Analyst">Data Analyst</option>
                </select>
            </div>
        </div>

        <div class="progress-timeline" id="timeline">
            <div class="progress-line"></div>
            <div class="progress-line-fill" id="progress-fill"></div>
            
            <div class="timeline-step active" onclick="showStep(0)">
                <div class="step-marker"></div>
                <div class="step-label">Học viên / Thực tập</div>
            </div>
            <div class="timeline-step" onclick="showStep(1)">
                <div class="step-marker"></div>
                <div class="step-label">Chuyên viên sơ cấp</div>
            </div>
            <div class="timeline-step" onclick="showStep(2)">
                <div class="step-marker"></div>
                <div class="step-label">Chuyên viên chính</div>
            </div>
            <div class="timeline-step" onclick="showStep(3)">
                <div class="step-marker"></div>
                <div class="step-label">Quản lý / Chuyên gia</div>
            </div>
        </div>

        <div class="detail-card" id="detail-card">
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        const careerData = {
            'UI Designer': [
                { title: "Intern", time: "0-6 tháng", desc: "Học Figma, Design Thinking và UI Audit.", tasks: ["Nắm vững Figma", "Học Design Thinking", "Làm quen Agile", "Hỗ trợ UI Audit"] },
                { title: "Junior", time: "6-24 tháng", desc: "Thiết kế User Flow và Wireframe.", tasks: ["Thiết kế User Flow", "Tạo Wireframe", "Usability Testing", "Component Library"] },
                { title: "Senior", time: "2-5 năm", desc: "Xây dựng Design System phức tạp.", tasks: ["Xây dựng Design System", "Phân tích dữ liệu", "Tối ưu chuyển đổi", "Phản biện thiết kế"] },
                { title: "Lead", time: "5 năm+", desc: "Định hướng chiến lược thiết kế.", tasks: ["Chiến lược sản phẩm", "Quản lý nguồn lực", "Đào tạo đội ngũ", "Tầm nhìn thương hiệu"] }
            ],
            'UX Researcher': [
                { title: "Intern", time: "0-6 tháng", desc: "Học phương pháp nghiên cứu định tính.", tasks: ["User Interview", "Take note phỏng vấn", "Sắp xếp dữ liệu", "Học công cụ survey"] },
                { title: "Junior", time: "6-24 tháng", desc: "Thực hiện khảo sát và phân tích cơ bản.", tasks: ["Xây dựng kịch bản", "Phân tích Survey", "Tạo Persona", "User Journey Map"] },
                { title: "Senior", time: "2-5 năm", desc: "Nghiên cứu chiến lược và định lượng.", tasks: ["Quantitative Research", "Phân tích tâm lý", "Chiến lược trải nghiệm", "Đo lường chỉ số UX"] },
                { title: "Lead", time: "5 năm+", desc: "Quản lý quy trình nghiên cứu toàn cầu.", tasks: ["Xây dựng Lab nghiên cứu", "Định hướng sản phẩm", "Tối ưu hóa quy trình", "Lãnh đạo đội ngũ"] }
            ],
            'Frontend Dev': [
                { title: "Intern", time: "0-6 tháng", desc: "Nắm vững HTML, CSS và JS cơ bản.", tasks: ["Cắt layout HTML/CSS", "Học Javascript cơ bản", "Làm quen Git/Github", "Sửa lỗi giao diện nhỏ"] },
                { title: "Junior", time: "6-24 tháng", desc: "Làm việc với React/Vue/Angular.", tasks: ["Phát triển Component", "Kết nối API", "State Management", "Responsive Design"] },
                { title: "Senior", time: "2-5 năm", desc: "Tối ưu hiệu năng và kiến trúc app.", tasks: ["Kiến trúc Micro-frontend", "Tối ưu Performance", "Viết Unit Test", "Review Code"] },
                { title: "Tech Lead", time: "5 năm+", desc: "Quyết định công nghệ và dẫn dắt team.", tasks: ["Lựa chọn Tech Stack", "Đào tạo kỹ sư", "Quản lý hệ thống", "Định hướng kỹ thuật"] }
            ],
            'Product Manager': [
                { title: "Associate", time: "0-1 năm", desc: "Hỗ trợ quản lý backlog và viết tài liệu.", tasks: ["Viết User Story", "Quản lý Backlog", "Hỗ trợ User Test", "Phân tích đối thủ"] },
                { title: "Junior PM", time: "1-3 năm", desc: "Chủ trì một tính năng của sản phẩm.", tasks: ["Lập kế hoạch Sprint", "Ưu tiên tính năng", "Theo dõi Roadmap", "Phân tích số liệu"] },
                { title: "Senior PM", time: "3-6 năm", desc: "Quản lý toàn bộ vòng đời sản phẩm.", tasks: ["Chiến lược sản phẩm", "Quản lý P&L", "Phát triển thị trường", "Quản lý stakeholder"] },
                { title: "Director", time: "6 năm+", desc: "Định hướng tầm nhìn sản phẩm công ty.", tasks: ["Tầm nhìn dài hạn", "Xây dựng văn hóa", "Cân đối kinh doanh", "Lãnh đạo PM team"] }
            ],
            'Graphic Designer': [
                { title: "Intern", time: "0-6 tháng", desc: "Học Photoshop, AI và bố cục cơ bản.", tasks: ["Chỉnh sửa ảnh", "Vẽ vector cơ bản", "Học về màu sắc", "Thiết kế social post"] },
                { title: "Junior", time: "6-24 tháng", desc: "Thiết kế bộ nhận diện thương hiệu nhỏ.", tasks: ["Thiết kế Logo", "Layout tạp chí", "Banner quảng cáo", "Typography"] },
                { title: "Senior", time: "2-5 năm", desc: "Sáng tạo concept cho các chiến dịch lớn.", tasks: ["Key Visual chiến dịch", "Art Direction", "Motion Graphics", "Brand Identity"] },
                { title: "Art Director", time: "5 năm+", desc: "Quản lý thẩm mỹ toàn bộ dự án.", tasks: ["Dẫn dắt sáng tạo", "Phê duyệt thiết kế", "Quản lý Agency", "Định hướng phong cách"] }
            ],
            'Data Analyst': [
                { title: "Intern", time: "0-6 tháng", desc: "Học SQL và các công cụ bảng tính.", tasks: ["Viết SQL cơ bản", "Sử dụng Excel/Sheets", "Làm sạch dữ liệu", "Học Tableau/PowerBI"] },
                { title: "Junior", time: "6-24 tháng", desc: "Phân tích số liệu và làm báo cáo.", tasks: ["Xây dựng Dashboard", "Phân tích xu hướng", "Báo cáo định kỳ", "Giải thích dữ liệu"] },
                { title: "Senior", time: "2-5 năm", desc: "Dự báo và phân tích chuyên sâu.", tasks: ["Dự báo doanh thu", "A/B Testing", "Mô hình hóa dữ liệu", "Tư vấn chiến lược"] },
                { title: "Head of Data", time: "5 năm+", desc: "Xây dựng hệ thống dữ liệu doanh nghiệp.", tasks: ["Chiến lược dữ liệu", "Quản lý hạ tầng", "Bảo mật dữ liệu", "Lãnh đạo team Data"] }
            ]
        };

        function showStep(index) {
            const steps = document.querySelectorAll('.timeline-step');
            const fill = document.getElementById('progress-fill');
            const card = document.getElementById('detail-card');
            const content = document.getElementById('detail-content');
            
            const currentRole = document.getElementById('career-select').value;
            const currentTimeline = careerData[currentRole] || careerData['UI Designer'];

            steps.forEach((s, i) => {
                if (i <= index) s.classList.add('active');
                else s.classList.remove('active');
            });

            const percentage = (index / (steps.length - 1)) * 75;
            fill.style.width = `${percentage}%`;

            const data = currentTimeline[index];
            card.classList.remove('show');

            setTimeout(() => {
                content.innerHTML = `
                    <div class="detail-header">
                        <div class="detail-title"><h2>${data.title}</h2></div>
                        <span class="detail-time">${data.time}</span>
                    </div>
                    <div class="detail-body">
                        <h3>Mục tiêu giai đoạn</h3>
                        <p>${data.desc}</p>
                        <h3>Kỹ năng & Nhiệm vụ cốt lõi</h3>
                        <div class="task-list">
                            ${data.tasks.map(t => `<div class="task-item"><span class="task-icon">✔</span> ${t}</div>`).join('')}
                        </div>
                    </div>
                `;
                card.classList.add('show');
            }, 300);
        }

        function handleNav(page) {
            const urlParams = new URLSearchParams(window.location.search);
            const career = urlParams.get('career') || localStorage.getItem('selectedCareer');
            if (career) {
                location.href = `${page}?career=${encodeURIComponent(career)}`;
            } else {
                location.href = page;
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const careerName = urlParams.get('career') || localStorage.getItem('selectedCareer') || "UI Designer";
        
        const careerSelect = document.getElementById('career-select');
        
        function updateCareerUI(name) {
            document.querySelector('.timeline-header h1').innerText = `Lộ trình thăng tiến: ${name}`;
            document.getElementById('career-subtitle').innerText = `Khám phá các cột mốc quan trọng và những kỹ năng cần thiết để đạt được đỉnh cao trong nghề ${name}.`;
            
            // Set dropdown value if it exists
            const option = Array.from(careerSelect.options).find(opt => opt.value === name || opt.text === name);
            if (option) careerSelect.value = option.value;
            
            localStorage.setItem('selectedCareer', name);
            showStep(0);
        }

        careerSelect.addEventListener('change', (e) => {
            updateCareerUI(e.target.value);
            // Update URL without refresh
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('career', e.target.value);
            window.history.pushState({}, '', newUrl);
        });

        if (careerName) {
            updateCareerUI(careerName);
        }

        showStep(0);
    </script>
</body>
</html>
