<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trắc Nghiệm Định Hướng Nghề Nghiệp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-main: 'Inter', sans-serif;
      --font-heading: 'Instrument Sans', sans-serif;
      --bg-color: #f2f2f2;
      --bg-white: #ffffff;
      --text-black: #111111;
      --border-color: #e0e0e0;
      --accent: #000000;
      --radius-md: 16px;
      --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-main); background: var(--bg-color); color: var(--text-black); padding: 20px; }
    .quiz-container { max-width: 1200px; margin: 60px auto; width: 100%; padding: 0 30px; }
    .q-item { border: 1.5px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem; background: var(--bg-white); margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .btn { padding: 1rem 2.5rem; border-radius: 999px; font-weight: 800; cursor: pointer; border: 3px solid #000; text-transform: uppercase; box-shadow: 4px 4px 0px 0px #000; }
    .btn-primary { background: #000; color: #fff; }
    .progress-shell { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #e0e0e0; z-index: 9999; }
    .progress-fill { height: 100%; background: #000; width: 0%; transition: width 0.4s; }
  </style>
</head>
<body>
  <div class="progress-shell"><div class="progress-fill" id="progressFill"></div></div>
  <div class="quiz-container">
    <h1 style="text-align:center; margin-bottom: 2rem;">Khám Phá Bản Sắc Nghề Nghiệp</h1>
    <div id="questionArea"></div>
    <div style="display:flex; justify-content: space-between; margin-top: 2rem;">
      <button class="btn" onclick="window.location.href='/'">Trang chủ</button>
      <button class="btn btn-primary" onclick="goNext()">Xem kết quả</button>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../api-client.js"></script>

</body>
</html>
