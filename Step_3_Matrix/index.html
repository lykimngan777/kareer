<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix | Định Hướng Nghề Nghiệp Gen Z</title>
    <meta name="description"
        content="Website định hướng nghề nghiệp phong cách tối giản dành cho thế hệ Gen Z. Khám phá bản thân và tìm kiếm lộ trình sự nghiệp phù hợp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Step_3_Matrix/style.css">
</head>

<body>
    <header class="main-header" style="position: absolute; top: 1.5rem; left: 2rem; z-index: 100;">
        <a href="../index.html">
            <img src="/logo.png" alt="Kareer Logo" style="height: 60px; mix-blend-mode: multiply;">
        </a>
    </header>

    <main>
        <!-- Career Explorer View (from Screenshot) -->
        <section id="explorer" class="explorer-view">
            <div class="explorer-nav">
                <div class="nav-tab active" onclick="location.href='index.html'">Mở lối sự nghiệp</div>
                <div class="nav-tab" id="tab-detail">Chi tiết nghề nghiệp</div>
                <div class="nav-tab" id="tab-roadmap">Lộ trình phát triển</div>
            </div>

            <div class="matrix-canvas" id="matrix-canvas">
                <!-- Dots background will be handled by CSS -->
                <div class="matrix-grid"></div>
                
                <!-- Satellite Orbits -->
                <div class="orbits-container">
                    <div class="orbit-ring tier-1"></div>
                    <div class="orbit-ring tier-2"></div>
                    <div class="orbit-ring tier-3"></div>
                    <div class="orbit-ring tier-4"></div>
                    <div class="orbit-ring tier-5"></div>
                </div>

                <!-- Central Hub -->
                <div class="central-hub">
                    <div class="hub-content">
                        <p>Phân tích <br> chi tiết bản thân</p>
                        <div class="hub-arrow">↓</div>
                    </div>
                    <div class="hub-glow"></div>
                </div>

                <!-- Career Nodes (Generated by JS) -->
                <div id="career-nodes"></div>

                <!-- Analysis Modal (Full-Screen) -->
                <div id="strengths-modal" class="modal">
                    <div class="modal-content-fullscreen">
                        <button class="close-modal-btn">&times;</button>
                        
                        <div class="analysis-text-wrapper">
                                <div id="analysis-paragraph" class="analysis-paragraph"></div>
                            </div>
                            

                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <a href="../Step 2/index.html" class="back-to-results">
            <span class="back-icon">←</span>
            <span class="back-text">Kết quả phân tích</span>
        </a>
    </main>

    <script src="/config.js"></script>
    <script src="/api-client.js"></script>
    <script src="/Step_3_Matrix/main.js"></script>
</body>

</html>
