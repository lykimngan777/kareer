<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xây dựng Bản sắc Nghề nghiệp | Kareer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            background-color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100%;
        }

        .builder-page-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .builder-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
            padding: 0 1rem;
        }

        .btn-builder-submit {
            padding: 1rem 2.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-builder-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            background: #222;
        }
        /* Specific fix for Base page to prevent content overlap */
        .main-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            background: white !important;
            z-index: 9999 !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 2rem !important;
            border-bottom: 1px solid rgba(0,0,0,0.05) !important;
        }
        .builder-left, .builder-right {
            padding-top: 70px !important;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <a href="index.html">
                <img src="KAREER.png" alt="Kareer Logo" class="main-logo">
            </a>
        </div>
    </header>
    <div class="builder-page-wrapper">
        <main class="profile-builder-content">
            <!-- Left Side: Inputs -->
            <div class="builder-left">
                <div id="builder-categories" class="builder-categories">
                    <!-- Categories injected by JS -->
                    <div class="loading-state">Đang tải dữ liệu...</div>
                </div>
            </div>

            <!-- Right Side: AI Statement -->
            <div class="builder-right">
                <div class="statement-card">
                    <div id="ai-statement-text" class="ai-statement-text">
                        Bắt đầu điền thông tin để nhận bản mô tả...
                    </div>
                </div>

                <div class="builder-footer">
                    <button class="btn-primary btn-builder-submit" id="btn-submit-profile">TIẾP TỤC KHÁM PHÁ</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Suggestions Modal -->
    <div id="suggestions-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Chọn gợi ý</h3>
                <button class="btn-close-modal" onclick="closeModal()">×</button>
            </div>
            <div id="suggestions-list" class="suggestions-grid">
                <!-- Suggestions injected by JS -->
            </div>
            <div class="modal-divider">hoặc tự nhập</div>
            <div class="modal-input-group">
                <input type="text" id="custom-tag-input" placeholder="Nhập nội dung khác...">
                <button class="btn-add-custom" onclick="addCustomTag()">Thêm</button>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #fff;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 { margin: 0; font-size: 1.2rem; }

        .btn-close-modal {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;
        }

        .suggestions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .suggestion-btn {
            background: #f5f5f5;
            border: 1px solid #eee;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #000;
            color: #fff;
            transform: translateY(-2px);
        }

        .modal-divider {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin: 1rem 0;
            position: relative;
        }

        .modal-divider::before, .modal-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #eee;
        }
        .modal-divider::before { left: 0; }
        .modal-divider::after { right: 0; }

        .modal-input-group {
            display: flex;
            gap: 10px;
        }

        .modal-input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input-group input:focus { border-color: #000; }

        .btn-add-custom {
            background: #000;
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
    <script src="config.js"></script>
    <script src="api-client.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.pathname.includes('builder.html')) {
                if (typeof initBuilder === 'function') {
                    initBuilder();
                }
            }
        });
    </script>
</body>
</html>
