<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trắc Nghiệm Định Hướng Nghề Nghiệp</title>
  <meta name="description"
    content="Khám phá định hướng nghề nghiệp phù hợp với bản thân qua 35 câu hỏi trắc nghiệm khoa học.">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-main: 'Inter', sans-serif;
      --font-heading: 'Be Vietnam Pro', sans-serif;
      --bg-color: #f2f2f2;
      --bg-white: #ffffff;
      --text-black: #111111;
      --text-muted: #8c9aaf;
      --text-secondary: #555555;
      --border-color: #e0e0e0;
      --accent: #000000;
      --accent-hover: #333333;
      --shadow-sm: 0 4px 15px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-full: 999px;
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);

      --primary-yellow: #f0f0f0;
      --primary-pink: #111111;
      --primary-mint: #e8e8e8;
      --border-width: 1px;
      --card-shadow: var(--shadow-md);
      --success: #4caf50;
      --danger: #e53935;
      --radius: 12px;
    }

    /* ─── HEADER / LOGO ─── */
    .main-header {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      z-index: 1000;
    }

    .main-logo {
      height: 72px;
      width: auto;
      display: block;
      transition: var(--transition);
      mix-blend-mode: multiply;
    }

    @media (max-width: 768px) {
      .main-header { top: 1rem; left: 1rem; }
      .main-logo { height: 48px; }
    }

    body {
      font-family: var(--font-main);
      background: var(--bg-color);
      color: var(--text-black);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .quiz-container {
      max-width: 1200px;
      margin: 60px auto;
      width: 100%;
      padding: 0 30px;
    }

    .card {
      position: relative;
      width: 100%;
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: 50px;
      box-shadow: var(--shadow-md);
    }

    .progress-shell {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 6px;
      background: var(--border-color);
      z-index: 2000;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .q-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      background: #f8f9fa;
      border-radius: 16px;
      margin-bottom: 12px;
      border: 1.5px solid transparent;
      transition: all 0.3s ease;
    }

    .q-item.answered {
      background: #fff;
      border-color: #e8f5e9;
      opacity: 0.9;
    }

    .q-item:hover {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transform: scale(1.005);
    }

    .q-text {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      padding-right: 20px;
      color: #334155;
    }

    .options-row {
      display: flex;
      gap: 24px;
      padding-right: 1.5rem;
    }

    .opt-label {
      cursor: pointer;
      position: relative;
    }

    .opt-label input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .opt-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border-color);
      background: var(--bg-white);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .opt-label:hover .opt-circle { border-color: var(--accent); transform: scale(1.1); }
    .opt-label input:checked + .opt-circle { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.1); }

    .scale-header {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      margin-bottom: 20px;
      padding-right: 1.5rem;
    }
    .scale-label {
      width: 20px;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      letter-spacing: 0.08em;
    }

    /* Results UI */
    .result-screen { display: none; }
    .result-hdr { text-align: center; margin-bottom: 40px; }
    .result-title { font-family: var(--font-heading); font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; text-transform: uppercase; }

    .insight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 50px;
    }

    .insight-block {
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 8px 8px 0px 0px #000;
      border: 3px solid #000;
    }

    .insight-list { list-style: none; padding: 0; margin: 0; }
    .insight-list li { font-size: 0.95rem; line-height: 1.6; padding-left: 1.5rem; position: relative; margin-bottom: 10px; }
    .insight-list li::before { content: '→'; position: absolute; left: 0; font-weight: bold; }

    /* Scientific Models */
    .theory-box {
      background: var(--bg-white);
      border: 3px solid var(--text-black);
      border-radius: 12px;
      padding: 35px 25px;
      margin-top: 50px;
      margin-bottom: 50px;
      box-shadow: 10px 10px 0px 0px rgba(0,0,0,1);
    }

    .theory-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; border-bottom: 3px solid var(--text-black); padding-bottom: 15px; }

    .theory-section { border: 2px solid var(--text-black); border-radius: 12px; background: #fafafa; padding: 25px 20px; margin-bottom: 30px; }
    .theory-section-hdr { font-family: var(--font-heading); font-weight: 900; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1.5px dashed #ccc; padding-bottom: 10px; }

    .dim-item { padding: 20px; background: white; border: 2px solid #eee; border-radius: 10px; margin-bottom: 15px; }
    .dim-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .dim-label { font-family: var(--font-heading); font-weight: 800; font-size: 1rem; }
    .dim-badge { font-weight: 800; padding: 5px 15px; border-radius: 8px; font-size: 0.75rem; text-transform: uppercase; }

    .dim-bar-track { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; margin-bottom: 12px; border: 1px solid #ddd; }
    .dim-bar-fill { height: 100%; transition: width 1s ease-out; }

    .val-vhigh { background: #111; color: white; }
    .val-med   { background: #666; color: white; }
    .val-low   { background: #999; color: white; }

    /* Recommendation Box */
    .recommendation-box {
      background: #fff;
      border: 3px solid #000;
      border-radius: 16px;
      padding: 40px 25px;
      margin-top: 50px;
      margin-bottom: 50px;
      box-shadow: 12px 12px 0px 0px #000;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }

    .rec-item {
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000;
    }

    .rec-suitable { background: #f0faf0; border-color: #2e7d32; }
    .rec-unsuitable { background: #fff5f5; border-color: #c62828; }

    .rec-title { font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

    /* Buttons */
    .btn {
      font-family: var(--font-heading);
      padding: 1rem 2.5rem; border-radius: 999px; font-weight: 800; font-size: 0.95rem; cursor: pointer; border: 3px solid var(--text-black); text-transform: uppercase; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 10px; box-shadow: 4px 4px 0px 0px #000;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: transparent; color: var(--text-black); box-shadow: none; border-width: 2px; }
    .btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px 0px #000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 15px 30px; border-radius: 50px; font-size: 1rem; font-weight: 600; opacity: 0; transition: all 0.3s ease; z-index: 10000; }
    .toast.show { opacity: 1; bottom: 40px; }

    @media (max-width: 768px) {
      .card { padding: 2rem 1.5rem; }
      .q-item { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
      .options-row { width: 100%; justify-content: space-between; }
      .scale-header { display: none; }
      .rec-grid { grid-template-columns: 1fr; }
      .insight-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="main-header">
      <a href="index.html">
        <img src="Kareer (2).png" alt="Kareer Logo" class="main-logo">
      </a>
    </header>

    <div class="progress-shell" id="progressShell">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="quiz-container">
      <div class="card" id="hdrBlock">
        <h1 style="font-family: var(--font-heading); font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; text-align: center; text-transform: uppercase;">Khám Phá Bản Sắc Nghề Nghiệp</h1>
        <p style="text-align: center; color: var(--text-muted); font-size: 1rem; margin-bottom: 0;">Dành 10 phút để thấu hiểu năng lực và định vị lộ trình phát triển bản thân.</p>
      </div>

      <div id="questionArea" style="margin-top: 30px;">
        <!-- Questions injected by JS -->
      </div>

      <div class="footer" id="quizFooter">
        <div></div>
        <button class="btn btn-primary" onclick="goNext()">Hoàn tất bài test →</button>
      </div>

      <div id="resultScreen" class="result-screen">
        <div class="result-hdr">
          <h1 class="result-title" id="resultTitle">KẾT QUẢ PHÂN TÍCH</h1>
        </div>
        <div id="resultBody"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="api-client.js"></script>
  <script>
    const questions = [
      { text: "Tôi thích dành thời gian để thiết kế ứng dụng, đồ họa, video hoặc tạo nội dung sáng tạo.", group: "artistic" },
      { text: "Tôi cảm thấy hào hứng khi thử nghiệm những ý tưởng mới dù chưa chắc chắn sẽ thành công.", group: "artistic" },
      { text: "Tôi thích viết lách, vẽ tranh, chụp ảnh hoặc sáng tác theo phong cách riêng của mình.", group: "artistic" },
      { text: "Tôi thích dẫn dắt nhóm và thuyết phục mọi người thực hiện ý tưởng của mình.", group: "enterprising" },
      { text: "Tôi cảm thấy động lực khi đạt được thành tích cao và được người khác công nhận.", group: "enterprising" },
      { text: "Tôi thích tổ chức sự kiện, gây quỹ hoặc bán hàng.", group: "enterprising" },
      { text: "Tôi thích làm việc với các con số, dữ liệu và đảm bảo mọi thứ được sắp xếp chính xác.", group: "conventional" },
      { text: "Tôi ưu tiên sự ổn định, an toàn và các quy trình làm việc rõ ràng.", group: "conventional" },
      { text: "Tôi thích lập kế hoạch chi tiết và tuân thủ lịch trình đã đề ra.", group: "conventional" },
      { text: "Tôi thích giúp đỡ, lắng nghe và tư vấn cho người khác giải quyết vấn đề của họ.", group: "social" },
      { text: "Tôi quan tâm đến các vấn đề xã hội và muốn đóng góp giá trị cho cộng đồng.", group: "social" },
      { text: "Tôi thích làm việc trong môi trường tập thể và kết nối mọi người lại với nhau.", group: "social" },

      { text: "Tôi thích nghiên cứu khoa học, phân tích các hiện tượng và tìm lời giải cho những câu hỏi hóc búa.", group: "investigative" },
      { text: "Tôi thích dành hàng giờ để tìm hiểu sâu về một chủ đề chuyên môn mà mình quan tâm.", group: "investigative" },
      { text: "Tôi thường đặt câu hỏi 'tại sao' và tìm kiếm bằng chứng logic trước khi tin vào điều gì đó.", group: "investigative" },
      { text: "Sự tự do trong suy nghĩ và hành động là điều tối quan trọng đối với tôi.", group: "artistic" },
      { text: "Tôi muốn có tầm ảnh hưởng và quyền quyết định trong công việc.", group: "enterprising" },
      { text: "Tôi thích sự ngăn nắp và tối ưu hóa các quy trình sẵn có.", group: "conventional" },
      { text: "Tôi coi trọng sự tôn trọng và gìn giữ các giá trị truyền thống.", group: "conventional" },
      { text: "Tôi thấy hạnh phúc khi những người xung quanh tôi thành công và vui vẻ.", group: "social" },
      { text: "Tôi thường bắt đầu cuộc trò chuyện trong các sự kiện đông người.", group: "extraversion" },
      { text: "Tôi có xu hướng lo lắng khi đối mặt với những thay đổi đột ngột.", group: "neuroticism" },
      { text: "Tôi luôn sẵn lòng chia sẻ kiến thức và hỗ trợ đồng nghiệp.", group: "social" },
      { text: "Tôi thích những hoạt động mang tính thử thách và trải nghiệm mới lạ.", group: "openness" },
      { text: "Tôi thường tìm kiếm niềm vui và sự tận hưởng trong công việc hàng ngày.", group: "hedonism" },
      { text: "Tôi thích thể hiện bản sắc cá nhân thông qua phong cách làm việc.", group: "artistic" },
      { text: "Tôi coi trọng sự công bằng và bình đẳng trong mọi mối quan hệ.", group: "universalism" },

      { text: "Tôi thường dành thời gian để suy ngẫm về mục tiêu dài hạn của mình.", group: "conscientiousness" },
      { text: "Tôi tự tin khi trình bày ý tưởng trước đám đông.", group: "enterprising" },
      { text: "Tôi là người kiên trì và luôn hoàn thành công việc đúng hạn.", group: "conscientiousness" },

      { text: "Tôi coi trọng sự an toàn tài chính và công việc ổn định.", group: "security" }

    const groupInfo = {
      realistic: { name: "Thực tế (Realistic)", narrative: "Bạn là người hành động, thích làm việc với các công cụ, máy móc và vật thể hữu hình. Bạn coi trọng tính thực tiễn và sự ổn định.", traits: ["Kỹ thuật", "Thực tế"], strengths: ["Kỹ năng vận hành", "Sửa chữa"], weaknesses: ["Giao tiếp xã hội"], potential: ["Chuyên gia kỹ thuật"] },

    const dimDesc = {
      riasec: {
        realistic: ["Bạn ít quan tâm đến việc làm việc với công cụ vật lý.", "Bạn có khả năng vận hành máy móc cơ bản.", "Bạn là một chuyên gia về kỹ thuật và vận hành thực tế."],
        investigative: ["Bạn thích các giải pháp có sẵn hơn là nghiên cứu sâu.", "Bạn có tư duy phân tích ở mức ổn định.", "Bạn có khả năng nghiên cứu và giải quyết vấn đề cực kỳ xuất sắc."],
        artistic: ["Bạn thích sự ổn định và quy trình truyền thống.", "Bạn có khả năng sáng tạo trong công việc hàng ngày.", "Bạn là người có tư duy đổi mới và khả năng sáng tạo vượt trội."],
        social: ["Bạn ưu tiên làm việc độc lập và tập trung vào chuyên môn.", "Bạn có kỹ năng làm việc nhóm và thấu hiểu ở mức tốt.", "Bạn là người có khả năng kết nối và hỗ trợ cộng đồng mạnh mẽ."],
        enterprising: ["Bạn thích các vị trí hỗ trợ hơn là dẫn dắt.", "Bạn có tố chất lãnh đạo và khả năng thuyết phục.", "Bạn là người quyết đoán với khả năng dẫn dắt tổ chức xuất sắc."],
        conventional: ["Bạn thích sự linh hoạt và không muốn bị ràng buộc bởi quy trình.", "Bạn là người ngăn nắp và làm việc có kế hoạch.", "Bạn có khả năng quản trị nghiệp vụ và dữ liệu vô cùng chính xác."]
      },
      bigFive: {
        openness: ["Bạn thích những gì quen thuộc và an toàn.", "Bạn sẵn sàng đón nhận những thay đổi mới.", "Bạn luôn tìm kiếm những trải nghiệm và ý tưởng đột phá."],
        conscientiousness: ["Bạn làm việc theo cảm hứng và sự linh hoạt.", "Bạn là người có trách nhiệm và kỷ luật trong công việc.", "Bạn cực kỳ tận tâm và luôn hoàn thành xuất sắc mọi cam kết."],
        extraversion: ["Bạn thích môi trường làm việc yên tĩnh và độc lập.", "Bạn thoải mái khi giao tiếp và làm việc với mọi người.", "Bạn tràn đầy năng lượng và luôn là tâm điểm trong các hoạt động nhóm."],
        agreeableness: ["Bạn ưu tiên mục tiêu cá nhân và sự cạnh tranh.", "Bạn là người hòa đồng và dễ hợp tác.", "Bạn vô cùng thấu cảm và luôn đặt lợi ích tập thể lên trên."],
        neuroticism: ["Bạn giữ được sự bình tĩnh tuyệt vời dưới áp lực.", "Bạn có sự nhạy cảm nhất định với môi trường xung quanh.", "Bạn có nội tâm sâu sắc và cảm xúc phong phú."]
      },
      schwartz: {
        selfDirection: ["Thích hướng dẫn", "Tự chủ tốt", "Độc lập tuyệt đối"],
        stimulation: ["Yêu ổn định", "Thích đổi mới", "Yêu mạo hiểm"],
        hedonism: ["Kỷ luật cao", "Biết tận hưởng", "Yêu cuộc sống"],
        achievement: ["Ít tham vọng", "Cầu tiến", "Khát khao thành công"],
        power: ["Thích hỗ trợ", "Có ảnh hưởng", "Khát khao quyền lực"],
        security: ["Thích mạo hiểm", "Coi trọng an toàn", "Ưu tiên ổn định"],
        conformity: ["Thích phá cách", "Tuân thủ tốt", "Kỷ luật thép"],
        tradition: ["Thích đổi mới", "Trân trọng quá khứ", "Gìn giữ truyền thống"],
        benevolence: ["Tập trung cá nhân", "Tốt bụng", "Vị tha vô điều kiện"],
        universalism: ["Thực dụng", "Công bằng", "Lý tưởng hóa"]
      }
    };

    const conclusionData = {
      realistic: { conclusion: "Bạn là người thực tế, hành động và có khả năng vận hành tuyệt vời.", suitable: ["Kỹ sư vận hành", "Chuyên gia kỹ thuật"], unsuitable: ["Quan hệ công chúng", "Nghệ thuật trình diễn"] },
      investigative: { conclusion: "Bạn có trí tuệ sắc bén và khả năng phân tích vấn đề chuyên sâu.", suitable: ["Nhà phân tích dữ liệu", "Nghiên cứu viên"], unsuitable: ["Bán hàng trực tiếp", "Quản trị sự kiện"] },
      artistic: { conclusion: "Bạn sở hữu tâm hồn nghệ sĩ và khả năng sáng tạo không giới hạn.", suitable: ["Thiết kế đồ họa", "Sáng tạo nội dung"], unsuitable: ["Kế toán/Kiểm toán", "Vận hành quy chuẩn"] },
      social: { conclusion: "Bạn là trái tim của tập thể với khả năng thấu cảm và kết nối.", suitable: ["Tư vấn tâm lý", "Quản trị nhân sự"], unsuitable: ["Lập trình viên độc lập", "Kỹ thuật máy móc"] },
      enterprising: { conclusion: "Bạn là nhà lãnh đạo bẩm sinh với khả năng thuyết phục mạnh mẽ.", suitable: ["Quản trị kinh doanh", "Khởi nghiệp"], unsuitable: ["Lưu trữ hồ sơ", "Nghiên cứu lý thuyết"] },
      conventional: { conclusion: "Bạn là người kiến tạo sự ổn định và chính xác trong mọi hệ thống.", suitable: ["Chuyên gia tài chính", "Quản lý quy trình"], unsuitable: ["Nghệ thuật tự do", "Khám phá mạo hiểm"] }
    };

    function renderPage() {
      const area = document.getElementById('questionArea');
      const names = { 5: "Rất đúng", 4: "Khá đúng", 3: "Bình thường", 2: "Ít đúng", 1: "Không đúng" };
      let html = `<div class="scale-header">${['RẤT ĐÚNG','KHÁ ĐÚNG','BÌNH THƯỜNG','ÍT ĐÚNG','KHÔNG ĐÚNG'].map(l=>`<div class="scale-label">${l.split(' ').map(s=>`<span>${s}</span>`).join('')}</div>`).join('')}</div><div class="questions-list">`;
      questions.forEach((q, i) => {
        html += `<div class="q-item" id="q-${i}"><div class="q-text">${q.text}</div><div class="options-row">${[5,4,3,2,1].map(s=>`<label class="opt-label" title="${names[s]}"><input type="radio" name="q-${i}" value="${s}" ${answers[i]===s?'checked':''} onchange="saveAns(${i}, ${s})"><div class="opt-circle"></div></label>`).join('')}</div></div>`;
      });
      area.innerHTML = html + `</div>`;
    }

    let answers = new Array(35).fill(null);

    function saveAns(i, s) { answers[i] = s; document.getElementById(`q-${i}`).classList.add('answered'); updateProgress(); }
    function updateProgress() { document.getElementById('progressFill').style.width = (answers.filter(a=>a!==null).length/35*100) + '%'; }

    function goNext() {
      const missing = answers.map((a,i)=>a===null?i:-1).filter(i=>i!==-1);
      if (missing.length > 0) {
        showToast(`Bạn còn ${missing.length} câu chưa làm`);
        const first = document.getElementById(`q-${missing[0]}`);
        if (first) { first.scrollIntoView({ behavior:'smooth', block:'center'}); first.classList.add('error'); setTimeout(()=>first.classList.remove('error'),800); }
        return;
      }
      showResult();
    }

    function showResult() {
      try {
        const a = answers;
        const scoreModel = (items) => {
          let raw = 0, max = 0;
          items.forEach(it => { raw += (it.w > 0 ? a[it.qi] : (6 - a[it.qi])); max += 5; });
          return Math.round((raw / max) * 100);
        };
        const getLv = (pct) => {
          if (pct >= 70) return { text: 'Cao', class: 'val-vhigh', pct };
          if (pct >= 40) return { text: 'Trung bình', class: 'val-med', pct };
          return { text: 'Thấp', class: 'val-low', pct };
        };

        const riasec = {
          realistic: getLv(scoreModel([{qi:12,w:1},{qi:13,w:1}])),
          investigative: getLv(scoreModel([{qi:14,w:1},{qi:15,w:1},{qi:16,w:1},{qi:1,w:1}])),
          artistic: getLv(scoreModel([{qi:0,w:1},{qi:1,w:1},{qi:2,w:1},{qi:17,w:1},{qi:25,w:1},{qi:27,w:1}])),
          social: getLv(scoreModel([{qi:9,w:1},{qi:10,w:1},{qi:11,w:1},{qi:21,w:1},{qi:24,w:1}])),
          enterprising: getLv(scoreModel([{qi:3,w:1},{qi:4,w:1},{qi:5,w:1},{qi:18,w:1},{qi:32,w:1}])),
          conventional: getLv(scoreModel([{qi:6,w:1},{qi:7,w:1},{qi:8,w:1},{qi:19,w:1},{qi:20,w:1}]))
        };

        const bigFive = {
          openness: getLv(scoreModel([{qi:0,w:1},{qi:1,w:1},{qi:2,w:1},{qi:15,w:1},{qi:25,w:1}])),
          conscientiousness: getLv(scoreModel([{qi:6,w:1},{qi:7,w:1},{qi:8,w:1},{qi:33,w:1}])),
          extraversion: getLv(scoreModel([{qi:3,w:1},{qi:5,w:1},{qi:22,w:1},{qi:32,w:1}])),
          agreeableness: getLv(scoreModel([{qi:9,w:1},{qi:11,w:1},{qi:24,w:1},{qi:31,w:1}])),
          neuroticism: getLv(scoreModel([{qi:23,w:1}]))
        };

        const schwartz = {
          selfDirection: getLv(scoreModel([{qi:0,w:1},{qi:17,w:1}])),
          stimulation: getLv(scoreModel([{qi:1,w:1},{qi:25,w:1}])),
          hedonism: getLv(scoreModel([{qi:26,w:1}])),
          achievement: getLv(scoreModel([{qi:4,w:1},{qi:18,w:1}])),
          power: getLv(scoreModel([{qi:3,w:1},{qi:32,w:1}])),
          security: getLv(scoreModel([{qi:6,w:1},{qi:19,w:1}])),
          conformity: getLv(scoreModel([{qi:20,w:1},{qi:7,w:1}])),
          tradition: getLv(scoreModel([{qi:20,w:1}])),
          benevolence: getLv(scoreModel([{qi:9,w:1},{qi:24,w:1}])),
          universalism: getLv(scoreModel([{qi:11,w:1},{qi:10,w:1}]))
        };

        const scores = {};
        questions.forEach((q,i) => scores[q.group] = (scores[q.group]||0) + a[i]);
        const sorted = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);
        const top = sorted[0], secondary = sorted[1]||top;
        const profile = JSON.parse(localStorage.getItem('kareer_profile')||'{"name":"Bạn"}');

        const renderSection = (title, data, descKey) => {
          return `
            <div class="theory-section">
              <div class="theory-section-hdr"><span>${title}</span></div>
              <div class="dim-list">
                ${Object.entries(data).map(([key, val]) => {
                  const descIdx = val.pct >= 70 ? 2 : (val.pct >= 40 ? 1 : 0);
                  const desc = dimDesc[descKey][key][descIdx];
                  return `
                    <div class="dim-item">
                      <div class="dim-item-top"><span class="dim-label">${key.toUpperCase()}</span><span class="dim-badge ${val.class}">${val.text} (${val.pct}%)</span></div>
                      <div class="dim-bar-track"><div class="dim-bar-fill ${val.class}" style="width: ${val.pct}%"></div></div>
                      <p class="dim-desc">${desc}</p>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        };

        const insightBlocks = [
          { label: 'Đặc điểm cá nhân', items: [groupInfo[top].traits[0], groupInfo[secondary].traits[0], "Tư duy linh hoạt"] },
          { label: 'Thế mạnh cốt lõi', items: [groupInfo[top].strengths[0], groupInfo[top].strengths[1] || groupInfo[top].strengths[0], "Khả năng thích ứng"] },
          { label: 'Hạn chế cần lưu ý', items: [groupInfo[top].weaknesses[0], "Cần rèn luyện tính kiên nhẫn"] },
          { label: 'Tiềm năng đột phá', items: [groupInfo[top].potential[0], "Phát triển đa năng"] }
        ];

        document.getElementById('resultBody').innerHTML = `
          <div style="background:#fff; border:3px solid #000; padding:30px; margin-bottom:30px; border-radius:12px; box-shadow:8px 8px 0px 0px #000;">
            <h3 style="margin-bottom:20px; font-weight:900; text-transform:uppercase;">KẾT QUẢ DÀNH CHO ${(profile.name||"BẠN").toUpperCase()}</h3>
            <p style="font-size:1.1rem;">Bạn thuộc nhóm chủ đạo <strong>${groupInfo[top].name}</strong>. ${groupInfo[top].narrative}</p>
          </div>
          <div class="insight-grid">${insightBlocks.map((b,idx)=>`<div class="insight-block"><h4 style="font-weight:900; margin-bottom:15px; text-transform:uppercase; border-bottom:2px solid #eee; padding-bottom:8px;">${b.label}</h4><ul class="insight-list">${b.items.map(it=>`<li>${it}</li>`).join('')}</ul></div>`).join('')}</div>
          <div class="theory-box">
            <h2 class="theory-title">PHÂN TÍCH THEO MÔ HÌNH KHOA HỌC</h2>
            ${renderSection("Mô hình RIASEC", riasec, "riasec")}
            ${renderSection("Mô hình BIG FIVE", bigFive, "bigFive")}
            ${renderSection("Mô hình SCHWARTZ", schwartz, "schwartz")}
          </div>

          <div class="recommendation-box">
            <h2 class="theory-title" style="border-bottom:3px solid #000;">KẾT LUẬN & KHUYẾN NGHỊ</h2>
            <div style="margin-bottom: 30px;">
              <h3 style="font-weight: 900; text-transform: uppercase; margin-bottom: 15px; font-size: 1.1rem;">Bản sắc nghề nghiệp của bạn</h3>
              <p style="font-size: 1.05rem; line-height: 1.8; color: #333;">${conclusionData[top].conclusion}</p>
            </div>
            
            <div class="rec-grid">
              <div class="rec-item rec-suitable">
                <div class="rec-title" style="color: #2e7d32;"><span>✅ Phù hợp nhất với</span></div>
                <ul class="insight-list">
                  ${conclusionData[top].suitable.map(it => `<li style="color: #2e7d32;">${it}</li>`).join('')}
                </ul>
              </div>
              <div class="rec-item rec-unsuitable">
                <div class="rec-title" style="color: #c62828;"><span>❌ Không phù hợp với</span></div>
                <ul class="insight-list">
                  ${conclusionData[top].unsuitable.map(it => `<li style="color: #c62828;">${it}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>

          <div class="result-actions" style="display: flex; gap: 15px; justify-content: center; margin-top: 40px;">
            <button class="btn btn-ghost" onclick="window.location.href='index.html'">Trang chủ</button>
            <button class="btn btn-primary" style="background: #111; color: white;" onclick="window.location.href='step3.html'">Khám phá ma trận nghề nghiệp</button>
            <button class="btn btn-ghost" onclick="location.reload()">Làm lại</button>
          </div>
        `;

        document.getElementById('hdrBlock').style.display = 'none';
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('quizFooter').style.display = 'none';
        document.getElementById('progressShell').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { console.error(err); showToast("Có lỗi xảy ra. Vui lòng thử lại."); }
    }

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
    renderPage();
  </script>
</body>

</html>
