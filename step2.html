<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="analytics.js"></script>
  <title>Trắc Nghiệm Định Hướng Nghề Nghiệp</title>
  <meta name="description"
    content="Khám phá định hướng nghề nghiệp phù hợp với bản thân qua 35 câu hỏi trắc nghiệm khoa học.">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <style>
    * {
      box-shadow: none !important;
    }
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-main: 'Inter', system-ui, -apple-system, sans-serif;
      --font-heading: 'Inter', system-ui, -apple-system, sans-serif;
      --bg-color: #f2f2f2;
      --bg-white: #ffffff;
      --text-black: #111111;
      --text-muted: #8c9aaf;
      --text-secondary: #555555;
      --border-color: #e0e0e0;
      --accent: #000000;
      --accent-hover: #333333;
      --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.06);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-full: 999px;
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);

      --primary-yellow: #f0f0f0;
      --primary-pink: #111111;
      --primary-mint: #e8e8e8;
      --border-width: 1px;
      --card-shadow: var(--shadow-md);
      --success: #4caf50;
      --danger: #e53935;
      --radius: 12px;
    }

    .mobile-only {
      display: none;
    }
    .desktop-only {
      display: inline;
    }
    .mobile-nav-overlay {
      display: none;
    }

    /* ─── HEADER / LOGO ─── */
    .main-header {
      position: absolute;
      top: 1.5rem;
      left: 2rem;
      z-index: 9999;
    }

    .logo-area {
      pointer-events: auto;
      display: block;
    }

    .main-logo {
      height: 55px;
      width: auto;
      display: block;
      transition: var(--transition);
    }

    @media (max-width: 768px) {
      .main-logo {
        height: 35px;
      }
    }

    body {
      font-family: var(--font-main);
      background: var(--bg-color);
      color: var(--text-black);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* ─── TAB NAVIGATION (STANDARDIZED) ─── */
    .tab-container {
        position: fixed;
        top: 2rem;
        left: 50%;
        transform: translateX(-50%);
        display: none; /* Hidden by default */
        justify-content: center;
        gap: 0.5rem;
        padding: 0.5rem;
        background: #fff;
        border: 2px solid #000;
        border-radius: 100px;
        width: fit-content;
        z-index: 2000;
        box-shadow: 8px 8px 0px #000;
    }

    .tab-item {
        padding: 0.7rem 1.8rem;
        border-radius: 100px;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 700;
        font-family: var(--font-main);
        color: #000;
        background: transparent;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .tab-item:hover {
        background: #f0f0f0;
    }

    .tab-item.active {
        background: #000;
        color: #fff;
    }




    .quiz-container {
      max-width: 1200px;
      margin: 180px auto 60px;
      width: 100%;
      padding: 0 30px;
    }

    .opt-label {
      position: relative;
      cursor: pointer;
    }

    .opt-label::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%) translateY(5px);
      background: #111;
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .opt-label:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .card {
      position: relative;
      width: 100%;
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: 50px;
      box-shadow: var(--shadow-md);
    }

    .progress-shell {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.05);
      z-index: 3000;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      width: 100%;
      gap: 20px;
    }

    @media (max-width: 992px) {
        .quiz-container {
            margin-top: 120px;
            padding: 0 20px;
        }
        .card {
            padding: 30px 20px;
        }
    }

    @media (max-width: 768px) {
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px !important;
            background: rgba(242, 242, 242, 0.95) !important;
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 1.5rem !important;
            transform: none !important;
        }
        .main-logo {
            height: 35px !important;
        }
        .tab-container {
            display: none !important;
        }

        .mobile-nav-toggle {
            display: flex !important;
            position: static !important;
            width: 45px;
            height: 45px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            z-index: 10001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            margin: 0 !important;
        }

        .mobile-nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 9998;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }

        .mobile-nav-overlay.active {
            display: flex;
        }

        .mobile-nav-link {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #000;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .mobile-nav-link.active {
            color: #ffde59;
            text-decoration: underline;
        }

        .btn-close-nav {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            font-size: 2rem;
            font-weight: 800;
            cursor: pointer;
        }

        #hdrBlock h1 {
            font-size: 1.4rem !important;
        }

        .mobile-only {
            display: inline !important;
        }
        .desktop-only {
            display: none !important;
        }

        .result-actions {
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .result-actions .btn {
            width: fit-content;
            min-width: 200px;
            justify-content: center;
            padding: 0.8rem 1.5rem !important;
            font-size: 0.85rem !important;
        }
        .quiz-container {
            margin-top: 100px;
        }
        .section-header h2 {
            font-size: 1.5rem;
        }
        .section-header p {
            font-size: 0.85rem;
        }
        .card, .insight-block, .theory-box, .theory-section, .recommendation-box {
            padding: 1.5rem 0 !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
            width: 100% !important;
        }
        .score-val {
            font-size: 1.8rem;
        }
        .trait-label {
            font-size: 0.8rem;
        }
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .q-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      background: #f8f9fa;
      border-radius: 16px;
      margin-bottom: 12px;
      border: 1.5px solid transparent;
      transition: all 0.3s ease;
    }

    .q-item.answered {
      background: #fff;
      border-color: #e8f5e9;
      opacity: 0.9;
    }

    .q-item:hover {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      transform: scale(1.005);
    }

    .q-text {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      padding-right: 20px;
      color: #334155;
    }

    .options-row {
      display: flex;
      gap: 24px;
      padding-right: 1.5rem;
    }

    .opt-label {
      cursor: pointer;
      position: relative;
      width: 24px;
      display: flex;
      justify-content: center;
    }

    .opt-label input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 100;
      background: rgba(255,255,255,0.01); /* Invisible but tangible touch target */
    }

    .opt-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border-color);
      background: var(--bg-white);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .opt-label:hover .opt-circle {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .opt-label input:checked ~ .opt-circle {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
    }

    .scale-header {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      margin-bottom: 20px;
      padding-right: calc(1.5rem + 24px); /* Match options-row (1.5rem) + q-item (24px) */
    }

    .scale-label {
      width: 24px;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      letter-spacing: 0.08em;
    }

    /* Results UI */
    .result-screen {
      display: none;
    }

    .result-hdr {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 40px;
    }

    .result-title {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      text-transform: uppercase;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 50px;
    }

    .insight-block {
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 8px 8px 0px 0px #000;
      border: 3px solid #000;
    }

    .insight-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .insight-list li {
      font-size: 0.95rem;
      line-height: 1.6;
      padding-left: 1.5rem;
      position: relative;
      margin-bottom: 10px;
    }

    .insight-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      font-weight: bold;
    }

    /* Scientific Models */
    .theory-box {
      background: var(--bg-white);
      border: 3px solid var(--text-black);
      border-radius: 12px;
      padding: 35px 25px;
      margin-top: 50px;
      margin-bottom: 50px;
      box-shadow: 10px 10px 0px 0px rgba(0, 0, 0, 1);
    }

    .theory-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 30px;
      text-transform: uppercase;
      border-bottom: 3px solid var(--text-black);
      padding-bottom: 15px;
    }

    .theory-section {
      border: 2px solid var(--text-black);
      border-radius: 12px;
      background: #fafafa;
      padding: 25px 20px;
      margin-bottom: 30px;
    }

    .theory-section-hdr {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 1.2rem;
      margin-bottom: 20px;
      border-bottom: 1.5px dashed #ccc;
      padding-bottom: 10px;
    }

    .dim-item {
      padding: 25px 20px;
      background: white;
      border: 2px solid #eee;
      border-radius: 12px;
      margin-bottom: 35px;
      position: relative; /* For absolute badge */
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }

    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 15px;
      flex-wrap: wrap; /* For very small screens */
    }

    .dim-label {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1rem;
    }

    .dim-badge {
      font-weight: 800;
      font-size: 0.7rem;
      text-transform: uppercase;
      padding: 6px 14px !important;
      border-radius: 50px;
      border-width: 1.5px;
      border-style: solid;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .dim-bar-track {
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid #ddd;
    }

    .dim-bar-fill {
      height: 100%;
      background: #000;
      transition: width 1s ease-out;
    }

    .val-vhigh {
      background-color: #e8f5e9 !important; /* Pastel Green */
      color: #2e7d32 !important;
      border-color: #c8e6c9 !important;
    }

    .val-med {
      background-color: #fffde7 !important; /* Pastel Yellow */
      color: #f57f17 !important;
      border-color: #fff9c4 !important;
    }

    .val-low {
      background-color: #ffebee !important; /* Pastel Red/Pink */
      color: #c62828 !important;
      border-color: #ffcdd2 !important;
    }

    /* Recommendation Box */
    .recommendation-box {
      background: #fff;
      border: 3px solid #000;
      border-radius: 16px;
      padding: 40px 25px;
      margin-top: 50px;
      margin-bottom: 50px;
      box-shadow: 12px 12px 0px 0px #000;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }

    .rec-item {
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000;
    }

    .rec-suitable {
      background: #f0faf0;
      border-color: #2e7d32;
    }

    .rec-unsuitable {
      background: #fff5f5;
      border-color: #c62828;
    }

    .rec-title {
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      font-family: var(--font-heading);
      padding: 1rem 2.5rem;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      border: 3px solid var(--text-black);
      text-transform: uppercase;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 4px 4px 0px 0px #000;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-black);
      box-shadow: none;
      border-width: 2px;
    }

    .btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px 0px #000;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 10000;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      bottom: 40px;
    }

    .model-summary-box {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1.5px solid #eee;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .btn-toggle-narrative {
      background: #fff;
      background-image: linear-gradient(transparent 50%, #000 50%);
      background-size: 100% 200%;
      background-position: 0 0;
      border: 3px solid #000;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: var(--font-main);
      font-weight: 900;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 6px 6px 0px 0px #000;
      animation: btnAttention 2.5s infinite ease-in-out;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-toggle-narrative:hover {
      background-position: 0 -100%;
      color: #fff;
      transform: translate(-4px, -4px) scale(1.02);
      box-shadow: 10px 10px 0px 0px #000;
      animation: none;
    }

    .btn-toggle-narrative::after {
      content: '▼';
      font-size: 0.7rem;
      transition: transform 0.3s;
    }

    .btn-toggle-narrative.active::after {
      transform: rotate(180deg);
    }

    @keyframes btnAttention {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); box-shadow: 6px 10px 0px 0px rgba(0,0,0,0.2); }
    }

    .narrative-content {
      width: 100%;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body {
        padding: 5px;
      }

      .main-logo {
        height: 35px; /* Extra shrunken */
      }

      .tab-container {
        width: 95%;
        top: 3.2rem; /* Avoid centered logo */
        left: 50%;
        transform: translateX(-50%);
        padding: 0.2rem;
        gap: 5px;
      }

      .tab-item {
        padding: 0.25rem 0.5rem;
        font-size: 0.55rem; /* Extra shrunken tabs */
      }

      .card {
        padding: 0.5rem;
        margin-top: 60px;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }

      .q-item {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 15px 0;
        gap: 15px;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        background: transparent !important;
        box-shadow: none !important;
        transform: none !important;
      }

      .q-item.answered {
        background: rgba(0, 0, 0, 0.02) !important; /* Subtle feedback */
        border-radius: 8px;
      }

      .q-text {
        font-size: 1.05rem;
        font-weight: 700;
        color: #000;
        padding-right: 0;
        line-height: 1.4;
      }

      .options-row {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-end;
        gap: 5px;
        padding: 5px 0 10px 0;
      }

      .opt-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: auto;
        flex: 1;
        min-height: 50px; /* Larger hit area */
        justify-content: flex-end;
        padding: 5px 0;
        position: relative; /* CRITICAL for absolute children */
      }

      .mobile-label {
        display: block !important;
        font-size: 0.55rem;
        font-weight: 600;
        color: #666;
        text-align: center;
        max-width: 45px;
        line-height: 1.1;
        pointer-events: none; /* Don't block clicks */
      }

      .opt-circle {
        width: 24px;
        height: 24px;
        pointer-events: none; /* Don't block clicks */
      }

      .result-title {
        font-size: 1.4rem;
      }

      .theory-title {
        font-size: 1.1rem !important;
      }

      .recommendation-box h3 {
        font-size: 0.9rem !important;
      }

      .btn-toggle-narrative {
        font-size: 0.75rem !important;
        padding: 8px 16px !important;
      }

      .rec-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .rec-item {
        padding: 15px;
      }

      .insight-card {
        padding: 15px;
      }

      .btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
      }

      .footer {
        margin-top: 20px;
        gap: 10px;
      }

      .scale-header {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="shell">

    function renderPage() {
      // Check for saved results first
      const savedAnswers = localStorage.getItem('kareer_answers');
      if (savedAnswers) {
        try {
          answers = JSON.parse(savedAnswers);
          if (answers.length === 35 && !answers.includes(null)) {
            showResult();
            return;
          }
        } catch (e) {
          console.error("Error loading saved answers:", e);
        }
      }

      const area = document.getElementById('questionArea');
      const names = { 1: "KHÔNG ĐÚNG", 2: "ÍT ĐÚNG", 3: "BÌNH THƯỜNG", 4: "KHÁ ĐÚNG", 5: "RẤT ĐÚNG" };
      let html = `<div class="scale-header">${['KHÔNG ĐÚNG', 'ÍT ĐÚNG', 'BÌNH THƯỜNG', 'KHÁ ĐÚNG', 'RẤT ĐÚNG'].map(l => `<div class="scale-label">${l.split(' ').map(s => `<span>${s}</span>`).join('')}</div>`).join('')}</div><div class="questions-list">`;
      questions.forEach((q, i) => {
        html += `<div class="q-item" id="q-${i}"><div class="q-text">${q.text}</div><div class="options-row">${[1, 2, 3, 4, 5].map(s => `<label class="opt-label" data-tooltip="${names[s]}"><input type="radio" name="q-${i}" value="${s}" ${answers[i] === s ? 'checked' : ''} onchange="saveAns(${i}, ${s})"><div class="mobile-label" style="display:none;">${names[s]}</div><div class="opt-circle"></div></label>`).join('')}</div></div>`;
      });
      area.innerHTML = html + `</div>`;
    }

    let answers = new Array(35).fill(null);

    function saveAns(i, s) { answers[i] = s; document.getElementById(`q-${i}`).classList.add('answered'); updateProgress(); }
    function updateProgress() { document.getElementById('progressFill').style.width = (answers.filter(a => a !== null).length / 35 * 100) + '%'; }

    function goNext() {
      const missing = answers.map((a, i) => a === null ? i : -1).filter(i => i !== -1);
      if (missing.length > 0) {
        showToast(`Bạn còn ${missing.length} câu chưa làm`);
        const first = document.getElementById(`q-${missing[0]}`);
        if (first) { first.scrollIntoView({ behavior: 'smooth', block: 'center' }); first.classList.add('error'); setTimeout(() => first.classList.remove('error'), 800); }
        return;
      }
      showResult();
    }

    function showResult() {
      try {
        const a = answers;
        localStorage.setItem('kareer_answers', JSON.stringify(a));

        const scoreModel = (items) => {
          let raw = 0, max = 0;
          items.forEach(it => { raw += (it.w > 0 ? a[it.qi] : (6 - a[it.qi])); max += 5; });
          return Math.round((raw / max) * 100);
        };
        const getLv = (pct) => {
          if (pct >= 70) return { text: 'Cao', class: 'val-vhigh', pct };
          if (pct >= 40) return { text: 'Trung bình', class: 'val-med', pct };
          return { text: 'Thấp', class: 'val-low', pct };
        };

        const riasec = {
          realistic: getLv(scoreModel([{ qi: 12, w: 1 }, { qi: 13, w: 1 }])),
          investigative: getLv(scoreModel([{ qi: 14, w: 1 }, { qi: 15, w: 1 }, { qi: 16, w: 1 }, { qi: 1, w: 1 }])),
          artistic: getLv(scoreModel([{ qi: 0, w: 1 }, { qi: 1, w: 1 }, { qi: 2, w: 1 }, { qi: 17, w: 1 }, { qi: 25, w: 1 }, { qi: 27, w: 1 }])),
          social: getLv(scoreModel([{ qi: 9, w: 1 }, { qi: 10, w: 1 }, { qi: 11, w: 1 }, { qi: 21, w: 1 }, { qi: 24, w: 1 }])),
          enterprising: getLv(scoreModel([{ qi: 3, w: 1 }, { qi: 4, w: 1 }, { qi: 5, w: 1 }, { qi: 18, w: 1 }, { qi: 32, w: 1 }])),
          conventional: getLv(scoreModel([{ qi: 6, w: 1 }, { qi: 7, w: 1 }, { qi: 8, w: 1 }, { qi: 19, w: 1 }, { qi: 20, w: 1 }]))
        };

        const bigFive = {
          openness: getLv(scoreModel([{ qi: 0, w: 1 }, { qi: 1, w: 1 }, { qi: 2, w: 1 }, { qi: 15, w: 1 }, { qi: 25, w: 1 }])),
          conscientiousness: getLv(scoreModel([{ qi: 6, w: 1 }, { qi: 7, w: 1 }, { qi: 8, w: 1 }, { qi: 33, w: 1 }])),
          extraversion: getLv(scoreModel([{ qi: 3, w: 1 }, { qi: 5, w: 1 }, { qi: 22, w: 1 }, { qi: 32, w: 1 }])),
          agreeableness: getLv(scoreModel([{ qi: 9, w: 1 }, { qi: 11, w: 1 }, { qi: 24, w: 1 }, { qi: 31, w: 1 }])),
          neuroticism: getLv(scoreModel([{ qi: 23, w: 1 }]))
        };

        const schwartz = {
          selfDirection: getLv(scoreModel([{ qi: 0, w: 1 }, { qi: 17, w: 1 }])),
          stimulation: getLv(scoreModel([{ qi: 1, w: 1 }, { qi: 25, w: 1 }])),
          hedonism: getLv(scoreModel([{ qi: 26, w: 1 }])),
          achievement: getLv(scoreModel([{ qi: 4, w: 1 }, { qi: 18, w: 1 }])),
          power: getLv(scoreModel([{ qi: 3, w: 1 }, { qi: 32, w: 1 }])),
          security: getLv(scoreModel([{ qi: 6, w: 1 }, { qi: 19, w: 1 }])),
          conformity: getLv(scoreModel([{ qi: 20, w: 1 }, { qi: 7, w: 1 }])),
          tradition: getLv(scoreModel([{ qi: 20, w: 1 }])),
          benevolence: getLv(scoreModel([{ qi: 9, w: 1 }, { qi: 24, w: 1 }])),
          universalism: getLv(scoreModel([{ qi: 11, w: 1 }, { qi: 10, w: 1 }]))
        };

        const scores = {};
        const counts = {};
        questions.forEach((q, i) => {
            scores[q.group] = (scores[q.group] || 0) + a[i];
            counts[q.group] = (counts[q.group] || 0) + 1;
        });
        Object.keys(scores).forEach(group => { scores[group] = scores[group] / counts[group]; });

        const riasecGroups = ['realistic', 'investigative', 'artistic', 'social', 'enterprising', 'conventional'];
        const sorted = riasecGroups.sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
        const top = sorted[0], secondary = sorted[1] || top;

        const quizResult = {
          scores: scores, riasec: riasec, bigFive: bigFive, schwartz: schwartz,
          sorted: sorted, topGroup: top, secondGroup: secondary, timestamp: new Date().toISOString()
        };
        localStorage.setItem('kareer_result', JSON.stringify(quizResult));
        
        // Save to backend if possible
        if (typeof KareerAPI !== 'undefined') {
            KareerAPI.saveAssessment(quizResult).catch(err => console.error('[KareerAPI] Failed to save assessment:', err));
        }

        const translations = {
          realistic: "Thực tế", investigative: "Nghiên cứu", artistic: "Nghệ thuật", social: "Xã hội", enterprising: "Quản lý", conventional: "Nghiệp vụ",
          openness: "Cởi mở", conscientiousness: "Tận tâm", extraversion: "Hướng ngoại", agreeableness: "Hòa đồng", neuroticism: "Nhạy cảm",
          selfDirection: "Tự chủ", stimulation: "Đổi mới", hedonism: "Tận hưởng", achievement: "Thành tựu", power: "Quyền lực",
          security: "An toàn", conformity: "Tuân thủ", tradition: "Truyền thống", benevolence: "Nhân ái", universalism: "Công bằng"
        };

        const generateModelNarrative = (modelName, data) => {
          const s = Object.entries(data).sort((a,b) => b[1].pct - a[1].pct);
          const t = s[0], sc = s[1], l = s[s.length-1];
          let p = "";
          if (modelName === "RIASEC") {
            p = `Dựa trên phân tích mô hình RIASEC, bạn thể hiện một bản sắc nghề nghiệp vô cùng độc đáo và rõ nét. Điểm số cao nhất ở nhóm ${translations[t[0]]} cho thấy bạn là người luôn ưu tiên ${t[0]==='realistic'?'hành động thực tế':t[0]==='investigative'?'tư duy phân tích':t[0]==='artistic'?'sự sáng tạo':t[0]==='social'?'sự kết nối con người':t[0]==='enterprising'?'khát vọng lãnh đạo':'tính quy trình'} trong mọi công việc. Sự kết hợp với nhóm ${translations[sc[0]]} tạo nên một thế mạnh kép, giúp bạn không chỉ giỏi chuyên môn mà còn có khả năng thích nghi tốt với các môi trường làm việc hiện đại. Bạn thường có xu hướng tìm kiếm những thử thách đòi hỏi sự vận dụng linh hoạt của trí tuệ và kỹ năng cá nhân. Trong các dự án nhóm, bạn đóng vai trò là người ${t[0]==='social'?'gắn kết':'định hướng'} và luôn nỗ lực vì mục tiêu chung. Tuy nhiên, mức độ thấp ở nhóm ${translations[l[0]]} gợi ý rằng bạn có thể cảm thấy không thoải mái trong các công việc quá ${l[0]==='conventional'?'gò bó':l[0]==='artistic'?'tự do':l[0]==='realistic'?'nặng về kỹ thuật':'cạnh tranh'}. Điều này hoàn toàn bình thường và giúp bạn định vị rõ hơn những gì mình thực sự đam mê. Bạn nên tập trung vào những lĩnh vực cho phép mình phát huy tối đa sở trường hiện có thay vì cố gắng bù đắp những điểm yếu không cần thiết. Khả năng tư duy của bạn là một tài sản quý giá cho bất kỳ tổ chức nào. Bạn cũng là người có cái nhìn khá sâu sắc về các xu hướng nghề nghiệp trong tương lai. Sự tự tin và quyết đoán sẽ là khóa mở ra những cánh cửa thành công mới cho bạn. Hãy tiếp tục nuôi dưỡng niềm đam mê và không ngừng học hỏi từ những trải nghiệm thực tế. Bạn có tiềm năng trở thành một chuyên gia xuất sắc trong lĩnh vực đã chọn. Đây là thời điểm tuyệt vời để bạn bắt đầu xây dựng lộ trình phát triển dài hạn cho bản thân.`;
          } else if (modelName === "BIG FIVE") {

            realistic: "Trong tương lai, bạn sẽ đóng góp giá trị thông qua việc tạo ra các sản phẩm bền vững và các hệ thống vận hành thực tế. Mục tiêu dài hạn của bạn là trở thành một bậc thầy trong lĩnh vực kỹ thuật, người luôn đảm bảo mọi thứ được vận hành một cách hoàn hảo nhất.",
            investigative: "Bạn có tiềm năng trở thành một chuyên gia tư vấn hoặc nhà nghiên cứu đầu ngành, người mang lại những giải pháp đột phá cho xã hội. Mục tiêu dài hạn của bạn là đóng góp những kiến thức giá trị, giúp nhân loại hiểu sâu hơn về những lĩnh vực phức tạp.",
            artistic: "Mục tiêu dài hạn của bạn là để lại những dấu ấn sáng tạo riêng biệt trong ngành công nghiệp của mình. Bạn sẽ đóng góp giá trị bằng cách không ngừng đổi mới thẩm mỹ và tư duy, trở thành người dẫn dắt xu hướng và truyền cảm hứng cho thế hệ tiếp theo.",
            social: "Bạn sẽ là người kiến tạo các giá trị xã hội bền vững, nâng cao chất lượng cuộc sống cho những người yếu thế. Mục tiêu dài hạn của bạn là xây dựng nên những tổ chức hoặc chương trình có sức lan tỏa nhân văn, để lại một di sản về tình yêu thương.",
            enterprising: "Hướng phát triển của bạn là trở thành nhà lãnh đạo chiến lược hoặc chủ doanh nghiệp thành đạt. Bạn sẽ tạo ra giá trị bằng cách xây dựng những hệ thống kinh doanh mạnh mẽ, tạo ra việc làm và dẫn dắt tổ chức vươn ra tầm quốc tế.",
            conventional: "Bạn sẽ là người bảo vệ sự thịnh vượng bền vững cho tổ chức thông qua khả năng quản trị tài chính và quy trình xuất sắc. Mục tiêu dài hạn của bạn là xây dựng những bộ máy vận hành hoàn hảo, là chỗ dựa tin cậy cho mọi sự phát triển lâu dài."
          };
          return `${intros[top]} ${workStyles[top]} ${motivations[top]} ${environments[top]} ${futures[top]}`;
        };

        document.getElementById('resultBody').innerHTML = `
          <div class="theory-box">
            <h2 class="theory-title">PHÂN TÍCH THEO MÔ HÌNH KHOA HỌC</h2>
            ${renderSection("Mô hình RIASEC", riasec, "riasec")}
            ${renderSection("Mô hình BIG FIVE", bigFive, "bigFive")}
            ${renderSection("Mô hình SCHWARTZ", schwartz, "schwartz")}
          </div>

          <div class="recommendation-box">
            <h2 class="theory-title" style="border-bottom:3px solid #000;">KẾT LUẬN & KHUYẾN NGHỊ</h2>
            <div style="margin-bottom: 30px;">
              <h3 style="font-weight: 900; text-transform: uppercase; margin-bottom: 15px; font-size: 1.1rem;">Bản sắc nghề nghiệp của bạn</h3>
              <p style="font-size: 1.05rem; line-height: 1.8; color: #333; text-align: justify;">${generateFullIdentityNarrative(top, secondary, riasec, bigFive, schwartz)}</p>
            </div>
            <div class="rec-grid">
              <div class="rec-item rec-suitable">
                <div class="rec-title" style="color: #2e7d32;"><span>✅ PHÙ HỢP NHẤT VỚI</span></div>
                <ul class="insight-list">${conclusionData[top].suitable.map(it => `<li style="color: #333;">${it}</li>`).join('')}</ul>
              </div>
              <div class="rec-item rec-unsuitable">
                <div class="rec-title" style="color: #c62828;"><span>❌ KHÔNG PHÙ HỢP VỚI</span></div>
                <ul class="insight-list">${conclusionData[top].unsuitable.map(it => `<li style="color: #333;">${it}</li>`).join('')}</ul>
              </div>
            </div>
          </div>

          <div class="result-actions">
            <button class="btn btn-ghost" onclick="retakeTest()">Làm lại</button>
            <button class="btn btn-primary" style="background: #111; color: white; border: 2px solid #000;" onclick="window.location.href='step3.html'">
                <span class="desktop-only">Khám phá ma trận nghề nghiệp</span>
                <span class="mobile-only">Khám phá các vị trí nghề nghiệp</span>
            </button>
          </div>`;

        document.getElementById('hdrBlock').style.display = 'none';
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('quizFooter').style.display = 'none';
        document.getElementById('progressShell').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        
        const navTabs = document.getElementById('main-nav-tabs');
        if (navTabs) navTabs.style.display = 'flex';
        const quizContainer = document.querySelector('.quiz-container');
        if (quizContainer) {
            quizContainer.style.marginTop = window.innerWidth <= 768 ? '100px' : '160px';
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { console.error(err); showToast("Có lỗi xảy ra. Vui lòng thử lại."); }
    }

    function retakeTest() {
      if (confirm("Bạn có chắc chắn muốn làm lại bài test? Kết quả hiện tại sẽ bị xóa.")) {
        localStorage.removeItem('kareer_answers');
        location.reload();
      }
    }

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function toggleNarrative(btn) {
      btn.classList.toggle('active');
      const content = btn.nextElementSibling;
      const isHidden = content.style.display === 'none' || content.style.display === '';
      content.style.display = isHidden ? 'block' : 'none';
      btn.innerHTML = isHidden ? 'Ẩn bớt' : 'Xem nhận xét chi tiết';
    }

    renderPage();
  </script>

  <div class="mobile-nav-overlay" id="mobileNav">
      <button class="btn-close-nav" onclick="toggleMobileNav()">&times;</button>
      <a href="step2.html" class="mobile-nav-link active">Kết quả phân tích</a>
      <a href="step3.html" class="mobile-nav-link">Định hướng</a>
      <a href="timeline.html" class="mobile-nav-link">Chi tiết nghề nghiệp</a>
      <a href="roadmap.html" class="mobile-nav-link">Lộ trình phát triển</a>
  </div>

  <script>
      function toggleMobileNav() {
          document.getElementById('mobileNav').classList.toggle('active');
      }
  </script>
</body>
